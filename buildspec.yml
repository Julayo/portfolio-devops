version: 0.2

phases:
  build:
    commands:
      - "echo == Build phase =="
      - "echo Bucket: ${TARGET_BUCKET}"
      - "pwd"
      - "ls -la"

      # index.html and translations must never be served stale after a deploy
      - >
        aws s3 cp index.html s3://${TARGET_BUCKET}/index.html
        --cache-control "no-cache, must-revalidate"

      - >
        aws s3 sync translation/ s3://${TARGET_BUCKET}/translation/
        --cache-control "no-cache, must-revalidate"

      # Everything else: 1-day cache (no content hashing, so keep it short)
      - >
        aws s3 sync . s3://${TARGET_BUCKET} --delete
        --exclude '.git/*'
        --exclude '.gitignore'
        --exclude 'buildspec.yml'
        --exclude 'README.md'
        --exclude 'generate-og-image.html'
        --exclude 'resume.html'
        --exclude 'infra/*'
        --exclude 'index.html'
        --exclude 'translation/*'
        --cache-control "max-age=86400"

  post_build:
    commands:
      - "echo == CloudFront invalidation =="
      # Target only the files that change on each deploy instead of /* (cheaper + faster)
      - >
        aws cloudfront create-invalidation
        --distribution-id ${CLOUDFRONT_DIST_ID}
        --paths "/index.html" "/styles.css" "/js/*" "/translation/*" "/favicon.svg"
